appId: com.selfdiary.app
---
# Flow 07 – Sign out
- launchApp

# Navigate to settings tab
- tapOn: 'Settings'

# Verify profile section is visible
- assertVisible: 'Profile'
- assertVisible: 'e2e-test@selfdiary.com'

# Sign out
- tapOn: 'Sign Out'

# Should redirect to login screen
- assertVisible: 'SelfDiary'
- assertVisible: 'Sign In'
